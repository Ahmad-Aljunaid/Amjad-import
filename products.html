<!DOCTYPE html>
<html lang="ar" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المنتجات - مكتب أمجد عبد الكريم الجنيد</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .filter-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .search-input {
            padding: 10px;
            width: 300px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            font-family: 'Cairo', sans-serif;
        }

        .filter-btn {
            padding: 10px 20px;
            border: 1px solid var(--accent-color);
            background: none;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            color: var(--text-dark);
        }

        .filter-btn.active,
        .filter-btn:hover {
            background: var(--accent-color);
            color: var(--primary-color);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: var(--bg-white);
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            padding: 20px;
            text-align: center;
            transition: var(--transition);
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 5px;
        }

        .product-card h3 {
            margin: 15px 0 10px;
            color: var(--text-dark);
        }
    </style>
</head>

<body>
    <header class="navbar">
        <div class="logo"><a href="index.html">مكتب أمجد عبد الكريم الجنيد</a></div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="products.html" class="active">المنتجات</a></li>
                <li><a href="import-request.html">طلب استيراد</a></li>
            </ul>
        </nav>
    </header>

    <section class="section">
        <h2 class="section-title">دليل المنتجات والسلع</h2>

        <!-- أدوات الفلترة والبحث المباشر -->
        <div class="filter-container">
            <input type="text" id="searchBar" class="search-input" placeholder="ابحث عن منتج...">
            <button class="filter-btn active" data-filter="all">الكل</button>
            <button class="filter-btn" data-filter="electronics">إلكترونيات</button>
            <button class="filter-btn" data-filter="cars">قطع غيار ومعدات</button>
        </div>

        <!-- شبكة عرض المنتجات -->
        <div class="products-grid" id="productsGrid">
            <div class="product-card" data-category="electronics">
                <img src="https://images.unsplash.com/photo-1546868871-7041f2a55e12?q=80&w=500" alt="ساعات ذكية">
                <h3>ساعات ذكية واكسسوارات إلكترونية</h3>
                <button class="btn-gold" style="padding: 8px 15px; font-size: 14px; margin-top: 10px;"
                    onclick="alert('جاري تجهيز تفاصيل هذا المنتج')">طلب تسعيرة</button>
            </div>
            <div class="product-card" data-category="cars">
                <img src="https://images.unsplash.com/photo-1486006920555-c77dce18193b?q=80&w=500"
                    alt="قطع غيار سيارات">
                <h3>معدات وقطع غيار مركبات ثقيلة</h3>
                <button class="btn-gold" style="padding: 8px 15px; font-size: 14px; margin-top: 10px;"
                    onclick="alert('جاري تجهيز تفاصيل هذا المنتج')">طلب تسعيرة</button>
            </div>
        </div>
    </section>

    <script src="js/main.js"></script>
    <script>
        // سكربت التصفية الفورية للبحث والتصنيفات
        const searchBar = document.getElementById('searchBar');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const products = document.querySelectorAll('.product-card');

        searchBar.addEventListener('keyup', (e) => {
            const searchText = e.target.value.toLowerCase();
            products.forEach(product => {
                const title = product.querySelector('h3').innerText.toLowerCase();
                product.style.display = title.includes(searchText) ? "block" : "none";
            });
        });

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelector('.filter-btn.active').classList.remove('active');
                btn.classList.add('active');
                const filterValue = btn.getAttribute('data-filter');

                products.forEach(product => {
                    if (filterValue === 'all' || product.getAttribute('data-category') === filterValue) {
                        product.style.display = "block";
                    } else {
                        product.style.display = "none";
                    }
                });
            });
        });
    </script>
</body>

</html>
